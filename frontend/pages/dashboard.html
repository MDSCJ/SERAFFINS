<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SERRAFINS Dashboard - view stats, profile, and manage your account." />
    <title>Dashboard - SERRAFINS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../frontend/css/style.css" />
    <link rel="stylesheet" href="../../frontend/css/pages/dashboard.css" />
    <script defer src="../../frontend/javascript/main.js"></script>
</head>
<body>
    <canvas id="liquid-canvas" aria-hidden="true"></canvas>
    <div class="ambient-layer"></div>

    <header class="glass nav-wrap">
        <div class="nav-brand">SERRAFINS</div>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="main-navigation" aria-label="Open menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="main-navigation" class="main-nav">
            <a href="../../index.html">Home</a>
            <a href="packages.html">Packages</a>
            <a href="about.html">About</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>

    <main class="page-shell">
        <section class="dashboard-section">
            <h1>Dashboard</h1>

            <div class="dashboard-theme-row">
                <span class="dashboard-theme-label">Theme</span>
                <fieldset class="theme-switcher" aria-label="Dashboard theme switcher">
                    <legend class="theme-switcher__legend">Choose theme</legend>
                    <label class="theme-switcher__option">
                        <input class="theme-switcher__input" type="radio" name="theme" value="light" c-option="1" checked />
                        <svg class="theme-switcher__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 36 36">
                            <path fill="var(--theme-icon)" fill-rule="evenodd" d="M18 12a6 6 0 1 1 0 12 6 6 0 0 1 0-12Zm0 2a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z" clip-rule="evenodd"/>
                            <path fill="var(--theme-icon)" d="M17 6.038a1 1 0 1 1 2 0v3a1 1 0 0 1-2 0v-3ZM24.244 7.742a1 1 0 1 1 1.618 1.176L24.1 11.345a1 1 0 1 1-1.618-1.176l1.763-2.427ZM29.104 13.379a1 1 0 0 1 .618 1.902l-2.854.927a1 1 0 1 1-.618-1.902l2.854-.927ZM29.722 20.795a1 1 0 0 1-.619 1.902l-2.853-.927a1 1 0 1 1 .618-1.902l2.854.927ZM25.862 27.159a1 1 0 0 1-1.618 1.175l-1.763-2.427a1 1 0 1 1 1.618-1.175l1.763 2.427ZM19 30.038a1 1 0 0 1-2 0v-3a1 1 0 1 1 2 0v3ZM11.755 28.334a1 1 0 0 1-1.618-1.175l1.764-2.427a1 1 0 1 1 1.618 1.175l-1.764 2.427ZM6.896 22.697a1 1 0 1 1-.618-1.902l2.853-.927a1 1 0 1 1 .618 1.902l-2.853.927ZM6.278 15.28a1 1 0 1 1 .618-1.901l2.853.927a1 1 0 1 1-.618 1.902l-2.853-.927ZM10.137 8.918a1 1 0 0 1 1.618-1.176l1.764 2.427a1 1 0 0 1-1.618 1.176l-1.764-2.427Z" />
                        </svg>
                        <span class="theme-switcher__text">Light</span>
                    </label>
                    <label class="theme-switcher__option">
                        <input class="theme-switcher__input" type="radio" name="theme" value="dark" c-option="2" />
                        <svg class="theme-switcher__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 36 36">
                            <path fill="var(--theme-icon)" fill-rule="evenodd" d="M14.613 11.23a8 8 0 1 1 10.157 10.157 9 9 0 1 0-10.157-10.157Zm1.658 1.542a7 7 0 0 0 8.543 8.543 10.038 10.038 0 0 1-8.543-8.543Z" clip-rule="evenodd"/>
                        </svg>
                        <span class="theme-switcher__text">Dark</span>
                    </label>
                    <label class="theme-switcher__option">
                        <input class="theme-switcher__input" type="radio" name="theme" value="reading" c-option="3" />
                        <svg class="theme-switcher__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 36 36">
                            <path fill="var(--theme-icon)" fill-rule="evenodd" d="M12 9a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3V12a3 3 0 0 0-3-3H12Zm-1 3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H12a1 1 0 0 1-1-1V12ZM14 26a1 1 0 0 0 0 2h8a1 1 0 1 0 0-2h-8Z" clip-rule="evenodd"/>
                        </svg>
                        <span class="theme-switcher__text">Reading</span>
                    </label>
                </fieldset>
            </div>

            <div class="stats-grid">
                <article class="stat-card glass">
                    <div class="stat-accent stat-accent-users"></div>
                    <div class="stat-content">
                        <h3>Active Users</h3>
                        <p class="stat-number" id="active-users">&mdash;</p>
                        <p class="stat-label">Online right now</p>
                    </div>
                </article>

                <article class="stat-card glass">
                    <div class="stat-accent stat-accent-total"></div>
                    <div class="stat-content">
                        <h3>Total Users</h3>
                        <p class="stat-number" id="total-users">&mdash;</p>
                        <p class="stat-label">Registered users</p>
                    </div>
                </article>

                <article class="stat-card glass clock-card">
                    <div class="clock-content">
                        <h3>Current Time</h3>
                        <div class="mini-analog-clock" id="mini-clock">
                            <div class="clock-hand hour" id="clock-hour"></div>
                            <div class="clock-hand minute" id="clock-minute"></div>
                            <div class="clock-hand second" id="clock-second"></div>
                            <div class="clock-center-dot"></div>
                        </div>
                        <p class="clock-time" id="clock-time">--:--:--</p>
                        <p class="clock-date" id="clock-date">Loading date...</p>
                    </div>
                </article>
            </div>

            <section class="profile-card glass">
                <h2>Your Profile</h2>
                <div class="profile-info">
                    <div class="info-item">
                        <span class="label">Username</span>
                        <span class="value">Guest</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Email</span>
                        <span class="value">Not logged in</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Credits</span>
                        <span class="value credits">0</span>
                    </div>
                </div>
            </section>
        </section>
    </main>

    <script>
        // Dashboard clock
        function updateClock() {
            const now = new Date();
            const timeEl = document.getElementById('clock-time');
            const dateEl = document.getElementById('clock-date');
            const hourHand = document.getElementById('clock-hour');
            const minuteHand = document.getElementById('clock-minute');
            const secondHand = document.getElementById('clock-second');

            if (timeEl) {
                timeEl.textContent = now.toLocaleTimeString('en-US', { hour12: false });
            }
            if (dateEl) {
                dateEl.textContent = now.toLocaleDateString('en-US', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            }

            const hours = now.getHours() % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            const hourDeg = (hours * 30) + (minutes * 0.5);
            const minuteDeg = minutes * 6;
            const secondDeg = seconds * 6;

            if (hourHand) hourHand.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
            if (minuteHand) minuteHand.style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
            if (secondHand) secondHand.style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
